# /etc/fail2ban/filter.d/nodejs-auth.conf
# Matches failed login attempts logged by Express server

[Definition]
# Matches log lines like:
# [AUTH] Invalid API key attempt from 192.168.1.100
# [AUTH] Invalid token from 10.0.0.5
failregex = ^\[AUTH\] Invalid .+ from <HOST>$
            ^\[CSRF\] Token mismatch from <HOST>.*$
            ^.*"POST /api/auth/login.*" 401.*$

ignoreregex =
