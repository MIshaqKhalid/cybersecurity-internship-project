name: Security CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Dependency Vulnerability Scan ─────────────────────────────────────────
  dependency-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high

  # ─── Static Code Analysis ────────────────────────────────────────────────────
  sast:
    name: Static Analysis (ESLint Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: ESLint Security Plugin
        run: npx eslint . --plugin=security --rule='security/detect-sql-injection:error'

  # ─── Unit & Security Tests ───────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  # ─── Docker Build & Container Scan ──────────────────────────────────────────
  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [dependency-audit, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f week6/deployment/Dockerfile -t app:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

  # ─── OWASP ZAP Baseline Scan ─────────────────────────────────────────────────
  zap-scan:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Start app
        run: |
          docker build -f week6/deployment/Dockerfile -t app:test .
          docker run -d -p 3000:3000 --name test-app app:test
          sleep 10
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:3000'
          fail_action: true
      - name: Stop app
        if: always()
        run: docker stop test-app

  # ─── Deploy (only on main after all checks pass) ─────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [zap-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: echo "All security checks passed — deploying to staging..."
