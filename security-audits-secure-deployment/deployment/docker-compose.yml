version: '3.9'

services:
  app:
    build:
      context: ../..
      dockerfile: week6/deployment/Dockerfile
      target: production
    image: cybersec-intern-app:latest
    container_name: secure_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    cpus: '0.5'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  db:
    image: mysql:8.0
    container_name: secure_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    # DO NOT expose port externally — only accessible within Docker network
    expose:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  # Dependency vulnerability scanner
  trivy:
    image: aquasec/trivy:latest
    container_name: vuln_scanner
    command: image --exit-code 1 --severity HIGH,CRITICAL cybersec-intern-app:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - scan  # Only runs with: docker compose --profile scan up trivy

volumes:
  db_data:
    driver: local

networks:
  app-net:
    driver: bridge
    internal: false
